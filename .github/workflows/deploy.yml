name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to awesomekorean.com
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # 주의: frontend 빌드는 서버에서 수행합니다.
    # GitHub Actions runner 에는 .env(VITE_REVERB_APP_KEY 등)가 없어서
    # 여기서 build 하면 Pusher/Reverb 키가 비어있는 번들이 만들어지고
    # Vue 앱 전체가 로드되지 않는 문제가 있었습니다.
    # deploy.sh 가 서버의 .env 를 읽어서 올바르게 빌드합니다.
    steps:
      - name: Deploy via SSH (server builds with proper .env)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/awesomekorean
            bash deploy.sh
            echo "Deployed successfully to awesomekorean.com!"
