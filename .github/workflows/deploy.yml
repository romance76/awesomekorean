name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to somekorean.com
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, zip, gd, bcmath, mysql, redis, intl
          coverage: none

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/somekorean
            git config --global --add safe.directory /var/www/somekorean
            git pull origin main
            composer install --no-dev --optimize-autoloader --no-interaction -q
            npm ci --silent
            npm run build
            php8.2 artisan migrate --force
            php8.2 artisan config:cache
            php8.2 artisan route:cache
            php8.2 artisan view:cache
            chown -R www-data:www-data /var/www/somekorean/storage /var/www/somekorean/bootstrap/cache
            chmod -R 775 /var/www/somekorean/storage /var/www/somekorean/bootstrap/cache
            systemctl restart php8.2-fpm
            echo "Deployed successfully!"
