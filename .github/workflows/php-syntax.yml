name: PHP Syntax Check

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    name: PHP 8.2 Syntax Check (app/)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP Syntax Check (app/)
        run: |
          ERRORS=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "❌ Syntax error in: $file"
              php -l "$file"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find app -type f -name "*.php")

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Found $ERRORS PHP syntax error(s) in app/"
            exit 1
          fi
          echo "✅ All PHP files in app/ passed syntax check"

      - name: PHP Syntax Check (routes/, config/)
        run: |
          ERRORS=0
          for dir in routes config; do
            while IFS= read -r file; do
              if ! php -l "$file" > /dev/null 2>&1; then
                echo "❌ Syntax error in: $file"
                php -l "$file"
                ERRORS=$((ERRORS + 1))
              fi
            done < <(find "$dir" -type f -name "*.php" 2>/dev/null)
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Found $ERRORS PHP syntax error(s) in routes/ or config/"
            exit 1
          fi
          echo "✅ routes/ and config/ passed syntax check"
